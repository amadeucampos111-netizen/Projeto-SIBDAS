<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedTrack - Login</title>
    <link rel="shortcut icon" href="../assets/img/hosp_icon.png" type="image/png">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Titillium Web', sans-serif;
            background: linear-gradient(135deg, #1e4d2b 0%, #2a7542 100%);
            min-height: 100vh;
        }
    </style>
    <link rel="stylesheet" href="../assets/css/1240896.css">
</head>
<body class="d-flex align-items-center justify-content-center py-4">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-9 col-md-7 col-lg-5 col-xl-4">
            
            <div class="card login-card p-4 p-sm-5">
                
                <div class="text-center mb-4">
                    <a href="index.php">
                        <img src="../assets/img/hosp_icon.png" alt="MedTrack Logo" class="logo-img mb-2" onerror="this.style.display='none'">
                    </a>
                    <h3 class="fw-bold text-dark mt-2 mb-1">MedTrack</h3>
                    <p class="text-muted small">Sistema de Gestão Hospitalar</p>
                </div>
                
                <div id="container-erro"></div>
                
                <form id="formLogin">
                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold text-secondary small">Utilizador</label> 
                        <div class="input-group-custom">
                            <i class="fa-solid fa-user"></i> 
                            <input type="text" name="username" id="username" class="form-control" placeholder="Introduza o seu utilizador" required autocomplete="username">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold text-secondary small">Password</label>
                        <div class="input-group-custom">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" name="password" id="password" class="form-control" placeholder="Introduza a sua password" required autocomplete="current-password">
                        </div>
                    </div>

                    <div class="d-grid mb-2">
                        <button type="submit" id="btnEntrar" class="btn btn-green w-100 shadow-sm">
                            Entrar <i class="fa-solid fa-right-to-bracket ms-2"></i>
                        </button>
                    </div>
                </form>

            </div> 
            <div class="text-center mt-3">
                <small class="text-white-50">&copy; 2026 MedTrack. Todos os direitos reservados.</small>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.getElementById('formLogin').addEventListener('submit', function(e) {
    e.preventDefault(); // Impede o recarregamento da página

    const btn = document.getElementById('btnEntrar');
    const containerErro = document.getElementById('container-erro');
    
    // Desativar o botão para evitar duplos cliques
    btn.disabled = true;
    containerErro.innerHTML = '';

    // Agrupar os dados do formulário
    const formData = new FormData(this);

    // Enviar via AJAX para o ficheiro PHP
    fetch('../private/login.php', {
        method: 'POST',
        body: formData
    })
    .then(response => response.json()) // Converte a resposta do PHP em JSON objeto
    .then(data => {
        if (data.sucesso) {
            // Se as credenciais estiverem corretas, redireciona o utilizador
            window.location.href = data.redirecionar;
        } else {
            // Se falhar, exibe a mensagem devolvida pelo PHP e reativa o botão
            containerErro.innerHTML = `
                <div class="alert alert-danger d-flex align-items-center small py-2" role="alert">
                    <i class="fa-solid fa-triangle-exclamation me-2"></i>
                    <div>${data.mensagem}</div>
                </div>
            `;
            btn.disabled = false;
        }
    })
    .catch(error => {
        containerErro.innerHTML = `
            <div class="alert alert-danger d-flex align-items-center small py-2">
                <i class="fa-solid fa-circle-exclamation me-2"></i>
                <div>Erro de comunicação com o servidor. Tente novamente.</div>
            </div>
        `;
        btn.disabled = false;
    });
});
</script>
</body>
</html>
