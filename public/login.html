
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedTrack</title>

    <!-- Bootstrap CSS & custom CSS -->
    <link rel="stylesheet" href="assets/bootstrap/bootstrap.min.1240896.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/1240896.css">
    <!-- favicon -->
    <link rel="shortcut icon" href="assets/img/hosp_icon.png" type="image/png">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="assets/fontawesome/1240896.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;700&display=swap" rel="stylesheet">

</head>
<body>
    <!-- Bootstrap JS and custom JS -->
<script src="assets/bootstrap/bootstrap.bundle.1240896.js"></script> 

<div class="container-fluid mt5">
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-6 col-sm-8 col-10">
            <div class="card p-4">
                <div class="bng-navbar align-items-center justify-content-center my-4">

                <a href="index.html"><img src="assets/img/hosp_icon.png"></a>
                <a class="nav-link" href="index.html"><h4><strong>Sistema Hospitalar</strong></h4></a>

                </div>
        <div class="row">
                <div class="col">
                    <!-- Formulário -->
                     <form id="formLogin" method="post">
                            <div class="mb-3">
                                <!-- Utilizador -->
                                 <label for="text" class="form-label">Utilizador</label>
                                <input type="text" name="username" id="username" class="form-control">
                            </div>

                            <div class="mb-3">
                                <!-- Password -->
                                 <label for="password" class="form-label">Password</label>
                                <input type="password" name="password" id="password" class="form-control">
                            </div>

                            <div class="mb-3 text-center">
                                <!-- Submit -->
                                 <button type="submit" class="btn btn-secondary px-4">Entrar
                                    <i class="fa-solid fa-right-to-bracket ms-2"></i>
                                 </button>
                            </div>

                           
                    </form>

                </div>
        </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. Mapeamos o formulário e a zona de erro do HTML
    const form = document.getElementById('formLogin');
    const msgErro = document.getElementById('mensagem-erro');

    // 2. Ouvimos o momento em que o utilizador clica no botão "Entrar"
    form.addEventListener('submit', function(event) {
        
        // Impede o formulário de recarregar a página automaticamente
        event.preventDefault(); 

        // 3. Capturamos os valores escritos nos inputs
        const usernameDigitado = document.getElementById('username').value.trim();
        const passwordDigitada = document.getElementById('password').value;

        // 4. Definimos o utilizador e senha corretos (Estático para teste)
        const userCorreto = "admin";
        const passCorreta = "1234";

        // 5. Fazemos a verificação
        if (usernameDigitado === userCorreto && passwordDigitada === passCorreta) {
            
            // Se estiver correto, simula o início de sessão guardando no armazenamento local do navegador
            localStorage.setItem('usuario_logado', 'true');
            
            // Redireciona para o teu Dashboard
            window.location.href = "../private/dashboard.php";
            
        } else {
            // Se estiver errado, mostra o alerta oculto do Bootstrap com a mensagem
            msgErro.textContent = "Utilizador ou password incorretos!";
            msgErro.classList.remove('d-none');
        }
    });
</script>
</body>
</html>
