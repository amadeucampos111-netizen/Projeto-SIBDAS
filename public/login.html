<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedTrack - Login</title>
    <link rel="shortcut icon" href="assets/img/hosp_icon.png" type="image/png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Titillium Web', sans-serif;
            /* Background gradiente verde moderno e profissional */
            background: linear-gradient(135deg, #1e4d2b 0%, #2a7542 100%);
            min-height: 100vh;
        }

        /* Cartão de login flutuante com sombra suave */
        .login-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            background-color: #ffffff;
        }

        /* Estilização suave para os inputs */
        .form-control {
            border-radius: 8px;
            padding: 10px 12px 10px 40px; /* Espaço à esquerda para o ícone */
            border: 1px solid #ced4da;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #2a7542;
            box-shadow: 0 0 0 0.25rem rgba(42, 117, 66, 0.25);
        }

        /* Posicionamento dos ícones dentro dos inputs */
        .input-group-custom {
            position: relative;
        }

        .input-group-custom i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #6c757d;
            z-index: 10;
        }

        /* Botão de Entrar personalizado com tons verdes */
        .btn-green {
            background-color: #2a7542;
            color: #ffffff;
            border-radius: 8px;
            padding: 10px 0;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
        }

        .btn-green:hover {
            background-color: #1e4d2b;
            color: #ffffff;
            transform: translateY(-1px);
        }
        
        .logo-img {
            width: 70px;
            height: auto;
            transition: transform 0.3s ease;
        }
        
        .logo-img:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center py-4">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-9 col-md-7 col-lg-5 col-xl-4">
            
            <div class="card login-card p-4 p-sm-5">
                
                <div class="text-center mb-4">
                    <a href="index.html">
                        <img src="assets/img/hosp_icon.png" alt="MedTrack Logo" class="logo-img mb-2" onerror="this.style.display='none'">
                    </a>
                    <h3 class="fw-bold text-dark mt-2 mb-1">MedTrack</h3>
                    <p class="text-muted small">Sistema de Gestão Hospitalar</p>
                </div>
                
                <form id="formLogin" method="post" action="processar_login.php">
                    
                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold text-secondary small">Utilizador</label>
                        <div class="input-group-custom">
                            <i class="fa-solid fa-user"></i>
                            <input type="text" name="username" id="username" class="form-control" placeholder="Introduza o seu utilizador" required autocomplete="username">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold text-secondary small">Password</label>
                        <div class="input-group-custom">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" name="password" id="password" class="form-control" placeholder="Introduza a sua password" required autocomplete="current-password">
                        </div>
                    </div>

                    <div class="d-grid mb-2">
                        <button type="submit" class="btn btn-green w-100 shadow-sm">
                            Entrar <i class="fa-solid fa-right-to-bracket ms-2"></i>
                        </button>
                    </div>
                    
                </form>

            </div> <div class="text-center mt-3">
                <small class="text-white-50">&copy; 2026 MedTrack. Todos os direitos reservados.</small>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/1240896.js"></script>
</body>
</html>
